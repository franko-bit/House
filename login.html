<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOMELINE · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #faf8f5;
      color: #1a1a18;
      line-height: 1.6;
      min-height: 100vh;
      display: block
    .container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 48px;
      width: 100%;
    }

    #navbar-root {

    #navbar-root {
      display: block;
      width: 100%;
    }
      display: block;
      width: 100%;
    }

    /* ===== NAVBAR ===== */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 24px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #faf8f5;
      z-index: 100;
      padding-left: 48px;
      padding-right: 48px;
      max-width: 1440px;
      margin: 0 auto;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2px;
      font-family: 'Barlow Condensed', sans-serif;
      text-transform: uppercase;
      color: #1a1a18;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 48px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #5a5a56;
    }

    .hamburger {
      display: none;
      border: none;
      background: transparent;
      color: #1a1a18;
      font-size: 22px;
      cursor: pointer;
    }

    .nav-links a {
      text-decoration: none;
      color: inherit;
      transition: color 0.2s;
      text-transform: capitalize;
    }
    .nav-links a:hover,
    .nav-links a.active {
      color: #1a1a18;
      font-weight: 600;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-actions i {
      font-size: 18px;
      color: #5a5a56;
      cursor: pointer;
      transition: color 0.2s;
    }

    .nav-actions i:hover {
      color: #1a1a18;
    }

    .search-box {
      background: transparent;
      border: none;
      border-bottom: 1px solid #5a5a56;
      color: #5a5a56;
      padding: 4px 0;
      font-size: 13px;
      width: 140px;
    }

    .search-box::placeholder {
      color: #9a9a96;
    }

    /* ===== LOGIN CARD ===== */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 0 60px;
      width: 100%;
    }

    .login-card {
      width: min(440px, 100%);
      background: #ffffff;
      padding: 40px 44px;
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .login-card .brand-icon {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .login-card .brand-icon i {
      font-size: 28px;
      color: #1a1a18;
    }

    .login-card h1 {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
      font-family: 'Outfit', sans-serif;
      color: #1a1a18;
    }

    .login-card p {
      color: #5a5a56;
      margin-bottom: 28px;
      font-size: 14px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #1a1a18;
      font-family: 'Barlow Condensed', sans-serif;
    }

    input {
      width: 100%;
      border: 1px solid rgba(0, 0, 0, 0.08);
      padding: 12px 16px;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      background: #faf8f5;
      outline: none;
      transition: border 0.2s, background 0.2s;
      color: #1a1a18;
    }

    input:focus {
      border-color: #1a1a18;
      background: #ffffff;
    }

    .btn-primary {
      width: 100%;
      border: none;
      background: #1a1a18;
      color: #faf8f5;
      padding: 14px 28px;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.2s;
      font-family: 'Outfit', sans-serif;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .btn-primary:hover {
      background: #3a3a38;
    }

    .login-error {
      margin-top: 12px;
      color: #b42318;
      font-size: 13px;
      min-height: 20px;
    }

    .hint {
      margin-top: 20px;
      font-size: 12px;
      color: #9a9a96;
      padding-top: 16px;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      font-family: 'DM Mono', monospace;
    }

    .hint strong {
      color: #5a5a56;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 760px) {
      .container { padding: 0 20px; }
      .navbar { padding: 20px 20px; }
      .nav-links { display: none; }
      .hamburger { display: block; }
      .search-box { display: none; }
      .login-card { padding: 28px 24px; }
      .login-card h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

  <div id="navbar-root"></div>

  <div class="login-wrap">
    <div class="login-card">
      <div class="brand-icon">
        <i class="fas fa-home"></i>
        <span style="font-size: 14px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; font-family: 'Barlow Condensed', sans-serif;">HOMELINE</span>
      </div>
      <h1>Welcome Back</h1>
      <p>Access your dashboard and manage your listings.</p>
      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" value="admin@estatehub.com" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" value="admin123" required />
        </div>
        <button class="btn-primary" type="submit">Sign in</button>
        <div id="loginError" class="login-error"></div>
      </form>
      <div class="hint">
        <i class="fas fa-key" style="margin-right: 6px;"></i>
        Demo: <strong>admin@estatehub.com</strong> / <strong>admin123</strong>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
