<header>
  <div class="container">
    <nav class="navbar">
      <div class="logo-area">
        <a href="index.html" class="brand">HOMELINE</a>
      </div>

      <div class="nav-actions">
        <input type="text" class="search-box" placeholder="Search homes...">
        <i class="fas fa-search"></i>

        <button class="hamburger" id="hamburger" type="button" aria-label="Toggle navigation" aria-expanded="false">
          <i class="fas fa-bars"></i>
        </button>
      </div>

      <div class="nav-links" id="navLinks">
        <a href="index.html" class="active">Home</a>
        <a href="buy.html">Buy</a>
        <a href="rent.html">Rent</a>
        <a href="sell.html">Sell</a>
        <a href="property.html">Details</a>
        <a href="contact.html">Contact</a>
        <a href="create-post.html" data-auth="protected">Edit</a>
        <a href="login.html" data-auth="guest">Login</a>
        <a href="index.html" data-action="logout" data-auth="protected">Logout</a>
      </div>
    </nav>
  </div>
</header>

<style>
  /* ===== HEADER / NAV ===== */
  header {
    background: #faf8f5;
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  .container {
    max-width: 1440px;
    margin: 0 auto;
    padding: 0 48px;
  }

  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 24px;
    flex-wrap: wrap;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    font-family: 'Barlow Condensed', sans-serif;
    text-transform: uppercase;
    color: #1a1a18;
    text-decoration: none;
  }

  /* ===== NAV ACTIONS ===== */
  .nav-actions {
    display: flex;
    align-items: center;
    gap: 20px;
    order: 2;
  }

  .nav-actions i {
    font-size: 18px;
    color: #5a5a56;
    cursor: pointer;
    transition: color 0.2s;
  }

  .nav-actions i:hover {
    color: #1a1a18;
  }

  .search-box {
    background: transparent;
    border: none;
    border-bottom: 1px solid #5a5a56;
    color: #5a5a56;
    padding: 4px 0;
    font-size: 13px;
    width: 140px;
    font-family: 'Outfit', sans-serif;
    transition: width 0.3s;
  }

  .search-box::placeholder {
    color: #9a9a96;
  }

  .search-box:focus {
    outline: none;
    border-bottom-color: #1a1a18;
    width: 180px;
  }

  /* ===== ACTION BUTTON (CTA) ===== */
  .cta-btn {
    display: none; /* toggled on by auth rules below */
    background: #1a1a18;
    color: #faf8f5 !important;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
    padding: 10px 20px;
    border-radius: 999px;
    white-space: nowrap;
    transition: background 0.2s, transform 0.2s;
  }

  .cta-btn:hover {
    background: #3a3a36;
    transform: translateY(-1px);
  }

  /* ===== HAMBURGER ===== */
  .hamburger {
    display: none;
    border: none;
    background: transparent;
    color: #1a1a18;
    font-size: 22px;
    cursor: pointer;
    padding: 4px;
    margin-left: 4px;
  }

  .hamburger:hover {
    opacity: 0.7;
  }

  /* ===== NAV LINKS ===== */
  .nav-links {
    display: flex;
    align-items: center;
    gap: 48px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: #5a5a56;
    order: 3;
    width: auto;
  }

  .nav-links a {
    text-decoration: none;
    color: inherit;
    transition: color 0.2s;
    text-transform: capitalize;
    white-space: nowrap;
  }

  .nav-links a:hover {
    color: #1a1a18;
  }

  .nav-links a.active {
    color: #1a1a18;
    font-weight: 600;
  }

  /* ===== AUTH STATE STYLES ===== */
  .nav-links a[data-auth="protected"],
  .cta-btn[data-auth="protected"] {
    display: none;
  }

  .nav-links a[data-auth="guest"],
  .cta-btn[data-auth="guest"] {
    display: inline-block;
  }

  body.logged-in .nav-links a[data-auth="protected"],
  body.logged-in .cta-btn[data-auth="protected"] {
    display: inline-block;
  }

  body.logged-in .nav-links a[data-auth="guest"],
  body.logged-in .cta-btn[data-auth="guest"] {
    display: none;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 1024px) {
    .container {
      padding: 0 24px;
    }

    .nav-links {
      gap: 32px;
    }

    .search-box {
      width: 100px;
    }

    .search-box:focus {
      width: 140px;
    }
  }

  @media (max-width: 768px) {
    .container {
      padding: 0 20px;
    }

    .navbar {
      padding: 20px 0 16px;
      position: relative;
    }

    .logo-area {
      order: 1;
    }

    .nav-actions {
      order: 2;
      gap: 14px;
    }

    .nav-actions i {
      font-size: 16px;
    }

    .search-box {
      width: 80px;
      font-size: 12px;
    }

    .search-box:focus {
      width: 120px;
    }

    .cta-btn {
      padding: 8px 14px;
      font-size: 12px;
    }

    .hamburger {
      display: block;
      order: 3;
      font-size: 20px;
    }

    .brand {
      font-size: 18px;
    }

    /* Force-hidden by default, forced column when opened.
       !important guards against any page-level .nav-links rules
       loaded after this partial that could otherwise win. */
    .nav-links {
      display: none !important;
      flex-direction: column !important;
      align-items: flex-start !important;
      gap: 4px !important;
      width: 100% !important;
      padding: 16px 0 8px;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      order: 4;
    }

    .nav-links.open {
      display: flex !important;
    }

    .nav-links a {
      width: 100%;
      padding: 10px 0;
      font-size: 15px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
      white-space: normal;
    }

    .nav-links a:last-child {
      border-bottom: none;
    }

    .nav-links a.active::after {
      display: none;
    }
  }

  @media (max-width: 480px) {
    .container {
      padding: 0 16px;
    }

    .navbar {
      padding: 16px 0 12px;
    }

    .nav-actions {
      gap: 10px;
    }

    .nav-actions i {
      font-size: 14px;
    }

    .search-box {
      width: 60px;
      font-size: 11px;
    }

    .search-box:focus {
      width: 100px;
    }

    .search-box::placeholder {
      font-size: 10px;
    }

    .brand {
      font-size: 16px;
      letter-spacing: 1.5px;
    }

    .cta-btn {
      padding: 7px 12px;
      font-size: 11px;
    }

    .hamburger {
      font-size: 18px;
    }

    .nav-links a {
      font-size: 14px;
      padding: 8px 0;
    }
  }
</style>

<script>
  // ===== HAMBURGER TOGGLE =====
  document.addEventListener('DOMContentLoaded', function() {
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('navLinks');

    if (hamburger && navLinks) {
      hamburger.addEventListener('click', function(e) {
        e.stopPropagation();
        const isOpen = navLinks.classList.toggle('open');
        hamburger.setAttribute('aria-expanded', isOpen);
      });

      // Close menu when clicking outside
      document.addEventListener('click', function(e) {
        if (!hamburger.contains(e.target) && !navLinks.contains(e.target)) {
          navLinks.classList.remove('open');
          hamburger.setAttribute('aria-expanded', 'false');
        }
      });

      // Close menu when a link is clicked (mobile)
      navLinks.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', function() {
          if (window.innerWidth <= 768) {
            navLinks.classList.remove('open');
            hamburger.setAttribute('aria-expanded', 'false');
          }
        });
      });

      // Reset menu state on resize back to desktop
      window.addEventListener('resize', function() {
        if (window.innerWidth > 768) {
          navLinks.classList.remove('open');
          hamburger.setAttribute('aria-expanded', 'false');
        }
      });
    }

    // ===== AUTH STATE MANAGEMENT =====
    const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
    if (isLoggedIn) {
      document.body.classList.add('logged-in');
    }

    // Handle logout
    document.querySelectorAll('[data-action="logout"]').forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        localStorage.removeItem('isLoggedIn');
        document.body.classList.remove('logged-in');
        window.location.href = 'login.html';
      });
    });
  });
</script>
