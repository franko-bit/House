<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOMELINE · Sell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #faf8f5;
      color: #1a1a18;
      line-height: 1.6;
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 48px;
    }

    /* ===== HEADER / NAV ===== */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 24px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2px;
      font-family: 'Barlow Condensed', sans-serif;
      text-transform: uppercase;
      color: #1a1a18;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 48px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #5a5a56;
    }

    .hamburger {
      display: none;
      border: none;
      background: transparent;
      color: #1a1a18;
      font-size: 22px;
      cursor: pointer;
    }

    .nav-links a {
      text-decoration: none;
      color: inherit;
      transition: color 0.2s;
      text-transform: capitalize;
    }
    .nav-links a:hover,
    .nav-links a.active {
      color: #1a1a18;
      font-weight: 600;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-actions i {
      font-size: 18px;
      color: #5a5a56;
      cursor: pointer;
      transition: color 0.2s;
    }

    .nav-actions i:hover {
      color: #1a1a18;
    }

    .search-box {
      background: transparent;
      border: none;
      border-bottom: 1px solid #5a5a56;
      color: #5a5a56;
      padding: 4px 0;
      font-size: 13px;
      width: 140px;
    }

    .search-box::placeholder {
      color: #9a9a96;
    }

    /* ===== HERO BANNER ===== */
    .hero-banner {
      margin: 40px 0 48px;
      overflow: hidden;
      position: relative;
      background: #e8e6e1;
      min-height: 240px;
      background-image: url('https://images.unsplash.com/photo-1494526585095-c41746248156?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80');
      background-size: cover;
      background-position: center 30%;
      display: flex;
      align-items: center;
    }

    .hero-banner .overlay {
      background: linear-gradient(90deg, rgba(0,0,0,0.4) 10%, rgba(0,0,0,0.05) 80%);
      width: 100%;
      height: 100%;
      padding: 48px 52px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hero-banner h1 {
      color: #fff;
      font-size: 38px;
      font-weight: 300;
      letter-spacing: -1px;
      text-shadow: 0 4px 14px rgba(0,0,0,0.2);
      margin-bottom: 4px;
      font-family: 'Outfit', sans-serif;
    }

    .hero-banner p {
      color: rgba(255,255,255,0.9);
      font-size: 16px;
      font-weight: 400;
      max-width: 480px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    /* ===== SELL FORM ===== */
    .form-card {
      background: #ffffff;
      padding: 40px 44px;
      border: 1px solid rgba(0, 0, 0, 0.05);
      max-width: 820px;
      margin: 0 auto 80px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 6px;
      color: #1a1a18;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: 'Barlow Condensed', sans-serif;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      background: #faf8f5;
      transition: border 0.2s, background 0.2s;
      outline: none;
      color: #1a1a18;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #1a1a18;
      background: #ffffff;
    }

    .form-group textarea {
      min-height: 120px;
      resize: vertical;
    }

    .form-group input[type="file"] {
      padding: 12px 14px;
      background: #faf8f5;
      border: 1px dashed rgba(0, 0, 0, 0.15);
      cursor: pointer;
    }

    .form-group input[type="file"]:hover {
      border-color: #1a1a18;
    }

    .btn-primary {
      background: #1a1a18;
      color: #faf8f5;
      border: none;
      padding: 14px 40px;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.2s;
      font-family: 'Outfit', sans-serif;
      text-transform: uppercase;
      margin-top: 8px;
    }

    .btn-primary i {
      margin-right: 8px;
    }

    .btn-primary:hover {
      background: #3a3a38;
    }

    /* ===== FOOTER ===== */
    .footer-section {
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      padding: 48px 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr) auto;
      gap: 40px;
      margin-bottom: 24px;
    }

    .footer-col h4 {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #1a1a18;
      margin-bottom: 16px;
      font-family: 'Barlow Condensed', sans-serif;
    }

    .footer-col ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .footer-col a {
      font-size: 13px;
      color: #5a5a56;
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-col a:hover {
      color: #1a1a18;
    }

    .footer-badge {
      background: #1a1a18;
      color: #faf8f5;
      padding: 12px 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      align-self: flex-start;
    }

    .footer-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 20px;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      font-size: 12px;
      color: #9a9a96;
    }

    .social {
      display: flex;
      gap: 16px;
    }

    .social i {
      color: #5a5a56;
      cursor: pointer;
      transition: color 0.2s;
      font-size: 14px;
    }

    .social i:hover {
      color: #1a1a18;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) {
      .container { padding: 0 24px; }
      .footer-section { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 760px) {
      .container { padding: 0 20px; }
      .navbar { flex-wrap: wrap; gap: 16px; }
      .nav-links { display: none; }
      .hamburger { display: block; }
      .search-box { display: none; }

      .hero-banner { min-height: 180px; margin: 24px 0 32px; }
      .hero-banner .overlay { padding: 28px 24px; }
      .hero-banner h1 { font-size: 28px; }

      .form-card { padding: 24px 20px; margin-bottom: 48px; }
      .form-row { grid-template-columns: 1fr; }
      .footer-section { grid-template-columns: 1fr; gap: 24px; }
      .btn-primary { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

  <div id="navbar-root"></div>

  <main class="container">
    <!-- HERO BANNER -->
    <div class="hero-banner">
      <div class="overlay">
        <h1>Submit Your Property</h1>
        <p>List your property with confidence — reach thousands of potential buyers.</p>
      </div>
    </div>

    <!-- SELL FORM -->
    <div class="form-card">
      <div class="form-row">
        <div class="form-group">
          <label>Property title</label>
          <input placeholder="e.g. Modern villa" />
        </div>
        <div class="form-group">
          <label>Price</label>
          <input placeholder="RWF 500,000" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Bedrooms</label>
          <input type="number" placeholder="3" />
        </div>
        <div class="form-group">
          <label>Bathrooms</label>
          <input type="number" placeholder="2" />
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea placeholder="Describe the property, amenities, and highlights."></textarea>
      </div>
      <div class="form-group">
        <label>Upload images</label>
        <input type="file" multiple />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Owner name</label>
          <input placeholder="Full name" />
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input placeholder="Phone number" />
        </div>
      </div>
      <div class="form-group">
        <label>Location</label>
        <input placeholder="Address or neighborhood" />
      </div>
      <button class="btn-primary"><i class="fas fa-check-circle"></i> Submit for review</button>
    </div>
  </main>

  <!-- FOOTER -->
  <div class="container">
    <footer class="footer-section">
      <div class="footer-col">
        <h4>Company</h4>
        <ul>
          <li><a href="#">About</a></li>
          <li><a href="#">Careers</a></li>
          <li><a href="#">Press</a></li>
        </ul>
      </div>
      <div class="footer-col">
        <h4>Support</h4>
        <ul>
          <li><a href="#">Help</a></li>
          <li><a href="#">Returns</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </div>
      <div class="footer-col">
        <h4>Legal</h4>
        <ul>
          <li><a href="#">Privacy</a></li>
          <li><a href="#">Terms</a></li>
        </ul>
      </div>
      <div class="footer-badge">
        HOMELINE · 11MEDIA
      </div>
    </footer>

    <div class="footer-meta">
      <span>© 2026 HOMELINE — designed with care</span>
      <div class="social">
        <i class="fab fa-instagram"></i>
        <i class="fab fa-pinterest"></i>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
